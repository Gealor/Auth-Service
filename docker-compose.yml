version: '3.8'
networks:
  dev:

services:
  app:
    build: .
    ports:
      - 8000:8000
    networks:
      - dev

  db:
    image: postgres
    env_file:
      - ./src/.env
    ports:
      - 7000:5432
    volumes:
    - auth_bd_data:/var/lib/postgresql/data
    networks:
      - dev

volumes:  # указание глобального тома где-то в папках докера, чтобы не мозолила глаза
  auth_bd_data:

